services:
  openclaw:
    image: ${OPENCLAW_IMAGE}
    container_name: rowan-openclaw
    restart: unless-stopped
    environment:
      NODE_OPTIONS: "--max-old-space-size=3072"
      TZ: ${TZ}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      BRAVE_API_KEY: ${BRAVE_API_KEY}
      OPENCLAW_WEB_SEARCH_API_KEY: ${OPENCLAW_WEB_SEARCH_API_KEY}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN}
      SLACK_APP_TOKEN: ${SLACK_APP_TOKEN}
      VT_API_KEY: ${VT_API_KEY}
      ROWAN_API_URL: ${ROWAN_API_URL}
      ROWAN_API_KEY: ${ROWAN_API_KEY}
      OPENCLAW_WORKSPACE: /home/node/.openclaw/workspace
    command:
      - sh
      - -lc
      - |
        mkdir -p /home/node/.local/bin
        cat > /home/node/.local/bin/openclaw <<'EOF'
        #!/usr/bin/env sh
        exec node /app/openclaw.mjs "$@"
        EOF
        chmod +x /home/node/.local/bin/openclaw
        export PATH="/home/node/.local/bin:${PATH}"
        exec node openclaw.mjs gateway --allow-unconfigured --bind lan --port "${OPENCLAW_GATEWAY_PORT}"
    volumes:
      - ${WORKSPACE_DIR}:/home/node/.openclaw/workspace
      - ${OPENCLAW_CONFIG_DIR}:/home/node/.openclaw
      - ${OPENCLAW_STATE_DIR}:/var/lib/openclaw
      - ${BRAINOPS_DIR}:/home/node/.openclaw/brainops
      - ${BRAINOPS_DIR}/runtime/ssh:/home/node/.ssh:rw
    network_mode: host
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:${OPENCLAW_GATEWAY_PORT}/"]
      interval: 30s
      timeout: 5s
      retries: 5

  rowan-web:
    build:
      context: ../services/rowan-web
    container_name: rowan-web
    restart: unless-stopped
    environment:
      WORKSPACE_ROOT: /workspace
      ROWAN_WEB_ALLOWLIST: ${ROWAN_WEB_ALLOWLIST}
      ROWAN_WEB_PORT: 3333
      ROWAN_WEB_INDEX: ${ROWAN_WEB_INDEX}
    volumes:
      - ${WORKSPACE_DIR}:/workspace:ro
      - ${BRAINOPS_DIR}:/workspace/brainops:ro
    expose:
      - "3333"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:3333/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5

  restart-agent:
    build:
      context: ../services/restart-agent
    container_name: rowan-restart-agent
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./docker-compose.yml:/compose/docker-compose.yml:ro
      - ./.env:/compose/.env:ro
    environment:
      COMPOSE_PROJECT_NAME: compose
    expose:
      - "9111"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:9111/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: rowan-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - openclaw
      - rowan-web
