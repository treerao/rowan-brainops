services:
  openclaw:
    image: ${OPENCLAW_IMAGE}
    container_name: rowan-openclaw
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TZ: ${TZ}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN}
      SLACK_APP_TOKEN: ${SLACK_APP_TOKEN}
      OPENCLAW_WORKSPACE: /workspace
    command:
      - sh
      - -lc
      - openclaw gateway --port ${OPENCLAW_GATEWAY_PORT}
    volumes:
      - ${WORKSPACE_DIR}:/workspace
      - ${OPENCLAW_CONFIG_DIR}:/root/.openclaw
      - ${OPENCLAW_STATE_DIR}:/var/lib/openclaw
    expose:
      - "${OPENCLAW_GATEWAY_PORT}"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:${OPENCLAW_GATEWAY_PORT}/health"]
      interval: 30s
      timeout: 5s
      retries: 5

  rowan-web:
    build:
      context: ../services/rowan-web
    container_name: rowan-web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      WORKSPACE_ROOT: /workspace
      ROWAN_WEB_ALLOWLIST: ${ROWAN_WEB_ALLOWLIST}
      ROWAN_WEB_PORT: 3333
      ROWAN_WEB_INDEX: ${ROWAN_WEB_INDEX}
    volumes:
      - ${WORKSPACE_DIR}:/workspace:ro
    expose:
      - "3333"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:3333/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: rowan-cloudflared
    restart: unless-stopped
    env_file:
      - .env
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - openclaw
      - rowan-web
